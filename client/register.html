<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Trust - Register Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(180deg, #0B1120, #050814);
            color: #DCE7FF;
        }

        .card {
            width: min(560px, 95vw);
            border-radius: 20px;
            border: 1px solid rgba(131, 162, 241, 0.35);
            background: rgba(10, 18, 34, 0.92);
            box-shadow: 0 20px 50px rgba(2, 7, 18, 0.55);
            padding: 32px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px;
        }

        p {
            margin: 0 0 20px;
            color: #9FB2DA;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 12px;
        }

        input {
            height: 48px;
            border-radius: 10px;
            border: 1px solid rgba(126, 151, 218, 0.5);
            background: rgba(7, 14, 26, 0.88);
            color: #E3ECFF;
            padding: 0 12px;
            font-size: 14px;
        }

        button {
            margin-top: 8px;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2B468C, #3A60BF);
            color: #E8EFFF;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .row {
            margin-top: 14px;
            font-size: 13px;
            color: #A7BCDF;
        }

        .row a {
            color: #D0DEFF;
            text-decoration: none;
            border-bottom: 1px solid rgba(208, 222, 255, 0.45);
        }
    </style>
</head>
<body>
    <section class="card" aria-labelledby="register-title">
        <h1 id="register-title">Register Admin</h1>
        <p>Create a secure admin account and continue with Deep Trust verification.</p>

        <form>
            <input type="text" placeholder="Admin ID" required>
            <input type="email" placeholder="Work Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div class="row">Already registered? <a href="login.html">Go to Secure Login</a></div>
    </section>
</body>
</html>
